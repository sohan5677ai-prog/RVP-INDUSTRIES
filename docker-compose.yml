services:
  postgres:
    image: postgres:16-alpine
    container_name: rvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rvp
      POSTGRES_PASSWORD: rvp
      POSTGRES_DB: rvp
    ports:
      - "5432:5432"
    volumes:
      - rvp_pgdata:/var/lib/postgresql/data

volumes:
  rvp_pgdata:
