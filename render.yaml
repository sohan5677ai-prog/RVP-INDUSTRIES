services:
  - type: web
    name: rvp-server
    runtime: node
    plan: starter
    region: singapore
    rootDir: server
    buildCommand: npm install && npm run build
    # The Supabase DB is provisioned directly from a full `prisma db push` +
    # data load (not the stale migration history), so we do NOT run migrations
    # on boot — that would conflict with the live schema. Apply future schema
    # changes with `prisma db push` against Supabase, matching the dev workflow.
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: invoices
      - key: SLACK_ENABLED
        value: "false"
      # WhatsApp via Fast2SMS (shared KNM Multi ERP business number).
      # Test mode defaults ON in code — set WHATSAPP_TEST_MODE=false only after
      # the whole pipeline has been verified against WHATSAPP_TEST_NUMBER.
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: WHATSAPP_TEST_MODE
        value: "true"
      - key: WHATSAPP_TEST_NUMBER
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_PHONE_NUMBER_ID
        sync: false
      # Numeric Fast2SMS message_id of each approved template (from the panel).
      - key: FAST2SMS_TMPL_PO_CREATED
        sync: false
      - key: FAST2SMS_TMPL_STOCKIN_CONFIRMED
        sync: false
      - key: FAST2SMS_TMPL_PAYMENT_SENT
        sync: false
      - key: FAST2SMS_TMPL_DISPATCH_BROKER
        sync: false
      - key: FAST2SMS_TMPL_DISPATCH_DRIVER
        sync: false
      - key: FAST2SMS_TMPL_REMINDER
        sync: false
      - key: FAST2SMS_TMPL_PAYMENT_REMINDER
        sync: false
      - key: FAST2SMS_TMPL_VERIFICATION_STATEMENT
        sync: false
      - key: FAST2SMS_TMPL_PAYMENT_SENT_TEXT
        sync: false
      - key: FAST2SMS_TMPL_OWNER_DISPATCH_REMINDER
        sync: false
      - key: FAST2SMS_TMPL_OWNER_WEEKLY_SUMMARY
        sync: false
      - key: FAST2SMS_TMPL_OWNER_DUES_DIGEST
        sync: false
      # Scheduled WhatsApp jobs (owner/party reminders). Off until ready.
      - key: WHATSAPP_CRON_ENABLED
        value: "false"
      # Shared secret for the public /webhooks/whatsapp/jobs/:job cron endpoints.
      - key: CRON_SECRET
        sync: false
