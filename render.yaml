services:
  - type: web
    name: rvp-server
    runtime: node
    plan: starter
    region: singapore
    rootDir: server
    buildCommand: npm install && npm run build
    # The Supabase DB is provisioned directly from a full `prisma db push` +
    # data load (not the stale migration history), so we do NOT run migrations
    # on boot — that would conflict with the live schema. Apply future schema
    # changes with `prisma db push` against Supabase, matching the dev workflow.
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: invoices
      - key: SLACK_ENABLED
        value: "false"
