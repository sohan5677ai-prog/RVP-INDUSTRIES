name: Keep Render server awake

on:
  schedule:
    # Every 10 minutes - Render free tier spins down after 15 min of no traffic.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 20 https://rvp-server.onrender.com/api/health || echo "Ping failed (server may be cold-starting)"
